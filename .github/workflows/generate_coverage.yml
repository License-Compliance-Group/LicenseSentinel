# This workflow will install Python dependencies, run unit tests and create a coverage report
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Create coverage 

on:
  push:
    branches: [ "main", "develop", "automate-coverage-testing"]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  setup-venv:
    uses: ./.github/workflows/setup_venv.yml
    with:
      python-version: ${{ matrix.python-version }}
  build:
    needs: cache-venv
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Measure coverage with coverage
      run: |
        . ./.venv/bin/activate
        coverage run -m unittest discover
    - name: Create a report for further analysis
      run: |
        . ./.venv/bin/activate
        coverage xml -o test/reports/coverage.xml
    - name: Extract branch name
      shell: bash
      run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
      id: extract_branch
    - name: Commit a report to the repo
      uses: EndBug/add-and-commit@v9
      with:
        new_branch: ${{ steps.extract_branch.outputs.branch }} # push to branch that pr comes FROM, not the target
        default_author: github_actions
        add: |
          - test/reports/coverage.xml
        message: 'Append a coverage report'

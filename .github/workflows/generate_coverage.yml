# This workflow will install Python dependencies, run unit tests and create a coverage report
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Create coverage

on:
  push:
    branches: [ "main", "develop", "automate-coverage-testing"]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(vars.PYTHON_VERSIONS) }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/cache@v4
      id: cache-venv
      with:
        path: ./.venv/
        key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: ${{ runner.os }}-venv-${{ matrix.python-version }}-
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install venv on cache miss
      run: python src/scripts/venv_setup.py --recreate
      if: steps.cache-venv.outputs.cache-hit != 'true'
    - name: Measure coverage with coverage
      run: |
        . ./.venv/bin/activate
        coverage run -m unittest discover
    - name: Create a report for further analysis
      run: |
        . ./.venv/bin/activate
        coverage xml -o test/reports/coverage-${{ matrix.python-version }}.xml
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: test/reports/coverage-${{ matrix.python-version }}.xml

  commit:
    runs-on: ubuntu-latest
    needs: generate
    steps:
    - uses: actions/checkout@v4
    - name: Extract branch name
      shell: bash
      run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
      id: extract_branch

  comment:
    # Share the reports as comments.
    runs-on: ubuntu-latest
    needs: commit
    steps:
    - name: 'Append report'
      uses: |
        dorny/test-reporter@v2
        actions/checkout@v4
      with:
        artifact: /coverage-report-(.*)/
        name: 'Python ($1) Coverage Report'
        path: coverage-*.xml
        reporter: python-xunit

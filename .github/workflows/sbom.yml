name: Generate SBOM

on:
  push:
    branches:
      - "**"   # esegue su tutti i branch
  pull_request:
    branches:
      - "**"

jobs:
  sbom:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ${{ fromJSON(vars.PYTHON_VERSIONS) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4

        id: cache-venv
        with:
          path: ./.venv/
          key: ${{ runner.os }}-venv-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: ${{ runner.os }}-venv-${{ matrix.python-version }}-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install venv on cache miss
        run: python src/scripts/venv_setup.py --recreate
        if: steps.cache-venv.outputs.cache-hit != 'true'

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX JSON)
        run: |
          python3 src/scripts/sbom_generator.py

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
